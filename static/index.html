<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Face Compare POC</title>
    <style>
      :root {
        --ink: #17202a;
        --muted: #6d7885;
        --line: #d8dee6;
        --paper: #f5f7fa;
        --panel: #ffffff;
        --accent: #0f766e;
        --accent-ink: #ffffff;
        --warn: #9a4d00;
        --soft: #edf7f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(15, 118, 110, 0.08) 1px, transparent 1px),
          linear-gradient(rgba(15, 118, 110, 0.07) 1px, transparent 1px),
          var(--paper);
        background-size: 28px 28px;
        font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif SC", serif;
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 54px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .subhead {
        max-width: 620px;
        margin: 10px 0 0;
        color: var(--muted);
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 14px;
        line-height: 1.7;
      }

      .status-pill {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 10px 14px;
        border-radius: 999px;
        color: var(--muted);
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 13px;
        white-space: nowrap;
      }

      main {
        display: grid;
        grid-template-columns: minmax(340px, 0.9fr) minmax(420px, 1.1fr);
        gap: 18px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(23, 32, 42, 0.08);
      }

      .panel-inner {
        padding: 18px;
      }

      .section-title {
        margin: 0 0 12px;
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .field {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 13px;
        font-weight: 700;
      }

      select,
      input[type="number"] {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 0 12px;
        font-size: 14px;
      }

      .drop-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .drop {
        position: relative;
        min-height: 210px;
        border: 1px dashed #9eacb8;
        border-radius: 8px;
        background: #fbfcfd;
        overflow: hidden;
      }

      .drop input {
        position: absolute;
        inset: 0;
        cursor: pointer;
        opacity: 0;
      }

      .preview {
        width: 100%;
        height: 170px;
        display: grid;
        place-items: center;
        background: #f0f3f5;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: none;
      }

      .preview-note {
        padding: 12px;
        color: var(--muted);
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 12px;
        line-height: 1.5;
        text-align: center;
      }

      .drop-copy {
        padding: 10px;
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 13px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      button {
        height: 44px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: var(--accent-ink);
        padding: 0 18px;
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .hint {
        color: var(--muted);
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 12px;
        line-height: 1.5;
      }

      .result-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 14px;
        margin-bottom: 14px;
      }

      .verdict {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .metric {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 14px;
      }

      .metric div {
        background: var(--soft);
        border: 1px solid #cfe4df;
        border-radius: 7px;
        padding: 12px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-family: ui-sans-serif, "Avenir Next", "Noto Sans SC", sans-serif;
        font-size: 18px;
      }

      pre {
        margin: 0;
        max-height: 470px;
        overflow: auto;
        border-radius: 7px;
        background: #101820;
        color: #d7f7ee;
        padding: 14px;
        font-size: 12px;
        line-height: 1.55;
      }

      .error {
        color: #8a1f11;
      }

      @media (max-width: 900px) {
        header,
        main {
          display: block;
        }

        .status-pill {
          display: inline-block;
          margin-top: 16px;
        }

        .panel {
          margin-bottom: 16px;
        }

        .drop-grid,
        .metric {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>Face Compare<br />Workbench</h1>
          <p class="subhead">上传两张照片，切换候选模型配置，查看相似度、距离、耗时和原始响应。首次运行某个模型会下载权重，等待时间会更长。</p>
        </div>
        <div class="status-pill" id="configStatus">Loading configs</div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-inner">
            <h2 class="section-title">Input</h2>
            <div class="field">
              <label for="config">模型配置</label>
              <select id="config"></select>
            </div>

            <div class="field">
              <label for="threshold">自定义阈值，可留空</label>
              <input id="threshold" type="number" step="0.0001" placeholder="例如 buffalo_l similarity: 0.35" />
              <p class="hint" id="thresholdHint">DeepFace 距离越小越像；Buffalo_L cosine similarity 越大越像。</p>
            </div>

            <div class="field drop-grid">
              <label class="drop">
                <div class="preview"><img id="previewA" alt="Image A preview" /></div>
                <div class="drop-copy">照片 A</div>
                <input id="imageA" type="file" accept="image/*" />
              </label>

              <label class="drop">
                <div class="preview"><img id="previewB" alt="Image B preview" /></div>
                <div class="drop-copy">照片 B</div>
                <input id="imageB" type="file" accept="image/*" />
              </label>
            </div>

            <div class="actions">
              <button id="runButton">开始比对</button>
              <span class="hint" id="runHint">建议每张图先压缩到 1024px 以内。</span>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-inner">
            <div class="result-head">
              <div>
                <h2 class="section-title">Result</h2>
                <p class="verdict" id="verdict">等待测试</p>
              </div>
              <span class="status-pill" id="rank">No config</span>
            </div>

            <div class="metric">
              <div><span>Score</span><strong id="score">-</strong></div>
              <div><span>Decision</span><strong id="decision">-</strong></div>
              <div><span>Elapsed</span><strong id="elapsed">-</strong></div>
            </div>

            <pre id="json">{}</pre>
          </div>
        </section>
      </main>
    </div>

    <script>
      const configSelect = document.getElementById("config");
      const configStatus = document.getElementById("configStatus");
      const rank = document.getElementById("rank");
      const imageA = document.getElementById("imageA");
      const imageB = document.getElementById("imageB");
      const threshold = document.getElementById("threshold");
      const runButton = document.getElementById("runButton");
      const verdict = document.getElementById("verdict");
      const score = document.getElementById("score");
      const decision = document.getElementById("decision");
      const elapsed = document.getElementById("elapsed");
      const json = document.getElementById("json");
      const runHint = document.getElementById("runHint");

      let configs = [];
      const MAX_UPLOAD_SIDE = 1024;
      const JPEG_QUALITY = 0.84;

      function preview(input, imgId) {
        const img = document.getElementById(imgId);
        const note = img.parentElement.querySelector(".preview-note") || document.createElement("div");
        note.className = "preview-note";
        const file = input.files[0];
        if (!file) {
          img.style.display = "none";
          img.removeAttribute("src");
          note.textContent = "未选择图片";
          img.parentElement.appendChild(note);
          return;
        }

        const fileSize = file.size >= 1024 * 1024
          ? `${(file.size / 1024 / 1024).toFixed(2)} MB`
          : `${Math.max(1, Math.round(file.size / 1024))} KB`;
        if (file.size === 0) {
          img.style.display = "none";
          note.textContent = `文件为空：${file.name}`;
          img.parentElement.appendChild(note);
          return;
        }

        note.textContent = `读取中：${file.name} · ${fileSize}`;
        img.parentElement.appendChild(note);

        const reader = new FileReader();
        reader.onload = () => {
          img.onload = () => {
            note.remove();
            img.style.display = "block";
          };
          img.onerror = () => {
            serverPreview(file, img, note);
          };
          img.src = reader.result;
        };
        reader.onerror = () => {
          serverPreview(file, img, note);
        };
        reader.readAsDataURL(file);
      }

      async function serverPreview(file, img, note) {
        note.textContent = `浏览器无法直接预览，正在请求服务端转换：${file.name}`;
        const form = new FormData();
        form.append("image", file);
        try {
          const response = await fetch(apiUrl("api/preview"), { method: "POST", body: form });
          if (!response.ok) {
            throw new Error(await response.text());
          }
          const blob = await response.blob();
          img.onload = () => {
            note.remove();
            img.style.display = "block";
          };
          img.onerror = () => {
            img.style.display = "none";
            note.textContent = `服务端已转换，但浏览器仍无法显示：${file.name}`;
          };
          img.src = URL.createObjectURL(blob);
        } catch (error) {
          img.style.display = "none";
          note.textContent = `无法预览：${file.name}。仍可尝试直接比对；如果比对也失败，请转成标准 JPG/PNG。`;
        }
      }

      function loadImageFromFile(file) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const image = new Image();
          image.onload = () => {
            URL.revokeObjectURL(url);
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error(`浏览器无法解码图片：${file.name}`));
          };
          image.src = url;
        });
      }

      async function compressImageFile(file) {
        const image = await loadImageFromFile(file);
        const scale = Math.min(1, MAX_UPLOAD_SIDE / Math.max(image.naturalWidth, image.naturalHeight));
        const width = Math.max(1, Math.round(image.naturalWidth * scale));
        const height = Math.max(1, Math.round(image.naturalHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d");
        context.drawImage(image, 0, 0, width, height);

        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(
            (value) => value ? resolve(value) : reject(new Error(`图片压缩失败：${file.name}`)),
            "image/jpeg",
            JPEG_QUALITY
          );
        });

        return new File([blob], file.name.replace(/\.[^.]+$/, "") + ".jpg", { type: "image/jpeg" });
      }

      function selectedConfig() {
        return configs.find((item) => item.id === configSelect.value);
      }

      function updateConfigMeta() {
        const config = selectedConfig();
        if (!config) return;
        rank.textContent = `${config.rank} · ${config.score_direction}`;
      }

      function apiUrl(path) {
        const pathname = window.location.pathname.endsWith("/")
          ? window.location.pathname
          : `${window.location.pathname}/`;
        return `${pathname}${path}`;
      }

      async function readPayload(response) {
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch (error) {
          const snippet = text.replace(/\s+/g, " ").slice(0, 300);
          throw new Error(`服务没有返回 JSON，HTTP ${response.status}。通常是平台代理超时、端口映射页面或模型下载过程中断。返回片段：${snippet}`);
        }
      }

      async function loadConfigs() {
        const response = await fetch(apiUrl("api/configs"));
        configs = await readPayload(response);
        configSelect.innerHTML = configs
          .map((config) => `<option value="${config.id}">${config.rank} · ${config.label}</option>`)
          .join("");
        configStatus.textContent = `${configs.length} configs ready`;
        updateConfigMeta();
      }

      async function runCompare() {
        if (!imageA.files[0] || !imageB.files[0]) {
          verdict.textContent = "请先上传两张图片";
          verdict.className = "verdict error";
          return;
        }

        runButton.disabled = true;
        runHint.textContent = "正在压缩图片并提交。首次运行模型可能需要下载和加载权重。";
        verdict.textContent = "Running";
        verdict.className = "verdict";

        try {
          const [compressedA, compressedB] = await Promise.all([
            compressImageFile(imageA.files[0]),
            compressImageFile(imageB.files[0]),
          ]);
          const originalSize = imageA.files[0].size + imageB.files[0].size;
          const compressedSize = compressedA.size + compressedB.size;

          const form = new FormData();
          form.append("config_id", configSelect.value);
          form.append("image_a", compressedA);
          form.append("image_b", compressedB);
          form.append("threshold", threshold.value);

          runHint.textContent = `已压缩上传：${(originalSize / 1024 / 1024).toFixed(2)} MB -> ${(compressedSize / 1024 / 1024).toFixed(2)} MB`;
          const response = await fetch(apiUrl("api/compare"), { method: "POST", body: form });
          const data = await readPayload(response);
          json.textContent = JSON.stringify(data, null, 2);

          if (!response.ok) {
            throw new Error(data.detail || "compare failed");
          }

          const result = data.result;
          const scoreValue = result.score ?? result.distance;
          score.textContent = typeof scoreValue === "number" ? scoreValue.toFixed(6) : "-";
          elapsed.textContent = `${result.elapsed_ms} ms`;
          const same = result.same_person ?? result.deepface_verified;
          decision.textContent = same === undefined ? "-" : String(same);
          verdict.textContent = same === true ? "Same person" : same === false ? "Different person" : "Scored";
        } catch (error) {
          verdict.textContent = "Error";
          verdict.className = "verdict error";
          score.textContent = "-";
          decision.textContent = "-";
          elapsed.textContent = "-";
          json.textContent = JSON.stringify({ error: error.message }, null, 2);
        } finally {
          runButton.disabled = false;
          runHint.textContent = "建议每张图先压缩到 1024px 以内。";
        }
      }

      imageA.addEventListener("change", () => preview(imageA, "previewA"));
      imageB.addEventListener("change", () => preview(imageB, "previewB"));
      configSelect.addEventListener("change", updateConfigMeta);
      runButton.addEventListener("click", runCompare);
      loadConfigs().catch((error) => {
        configStatus.textContent = "Config load failed";
        json.textContent = JSON.stringify({ error: error.message }, null, 2);
      });
    </script>
  </body>
</html>
