services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      FACE_MYSQL_HOST: "${FACE_MYSQL_HOST:-host.docker.internal}"
      FACE_MYSQL_PORT: "${FACE_MYSQL_PORT:-3306}"
      FACE_MYSQL_USER: "${FACE_MYSQL_USER:-face}"
      FACE_MYSQL_PASSWORD: "${FACE_MYSQL_PASSWORD:-face}"
      FACE_MYSQL_DATABASE: "${FACE_MYSQL_DATABASE:-face_service_eval}"
      FACE_SERVICE_MODEL_CONFIG_IDS: "${FACE_SERVICE_MODEL_CONFIG_IDS:-buffalo_l,arcface_retinaface_cosine,arcface_retinaface_euclidean_l2,facenet512_retinaface_cosine,ghostfacenet_retinaface_cosine}"
      FACE_WORKER_CREDENTIALS_JSON: '[{"worker_id":"worker-buffalo-l","worker_token":"${FACE_WORKER_BUFFALO_TOKEN:-change-me-buffalo}","allowed_model_config_ids":["buffalo_l"],"allowed_capabilities":["face_compare.buffalo_l"]},{"worker_id":"worker-arcface-cosine","worker_token":"${FACE_WORKER_ARCFACE_COSINE_TOKEN:-change-me-arcface-cosine}","allowed_model_config_ids":["arcface_retinaface_cosine"],"allowed_capabilities":["face_compare.arcface_retinaface_cosine"]},{"worker_id":"worker-arcface-euclidean-l2","worker_token":"${FACE_WORKER_ARCFACE_EUCLIDEAN_L2_TOKEN:-change-me-arcface-euclidean-l2}","allowed_model_config_ids":["arcface_retinaface_euclidean_l2"],"allowed_capabilities":["face_compare.arcface_retinaface_euclidean_l2"]},{"worker_id":"worker-facenet512","worker_token":"${FACE_WORKER_FACENET512_TOKEN:-change-me-facenet512}","allowed_model_config_ids":["facenet512_retinaface_cosine"],"allowed_capabilities":["face_compare.facenet512_retinaface_cosine"]},{"worker_id":"worker-ghostfacenet","worker_token":"${FACE_WORKER_GHOSTFACENET_TOKEN:-change-me-ghostfacenet}","allowed_model_config_ids":["ghostfacenet_retinaface_cosine"],"allowed_capabilities":["face_compare.ghostfacenet_retinaface_cosine"]}]'
      FACE_API_ACCESS_KEY: "${FACE_API_ACCESS_KEY:-sampleaccesskey}"
      FACE_API_SECRET_KEY: "${FACE_API_SECRET_KEY:-samplesecretkey}"
      FACE_API_SOURCE_PRODUCT: "${FACE_API_SOURCE_PRODUCT:-internal_product_a}"
    volumes:
      - ./.data:/app/.data
      - ./.models:/app/.models
      - ./datasets:/app/datasets

  worker-buffalo-l:
    build: .
    command: python -m worker.main
    restart: unless-stopped
    depends_on:
      - api
    environment:
      FACE_API_BASE_URL: http://api:8000
      FACE_WORKER_ID: worker-buffalo-l
      FACE_WORKER_TOKEN: "${FACE_WORKER_BUFFALO_TOKEN:-change-me-buffalo}"
      FACE_WORKER_MODEL_CONFIG_ID: buffalo_l
      FACE_WORKER_CAPABILITY: face_compare.buffalo_l
      FACE_WORKER_POLL_SECONDS: "${FACE_WORKER_POLL_SECONDS:-2}"
    volumes:
      - ./.data:/app/.data
      - ./.models:/app/.models
      - ./datasets:/app/datasets

  worker-arcface-cosine:
    build: .
    command: python -m worker.main
    restart: unless-stopped
    depends_on:
      - api
    environment:
      FACE_API_BASE_URL: http://api:8000
      FACE_WORKER_ID: worker-arcface-cosine
      FACE_WORKER_TOKEN: "${FACE_WORKER_ARCFACE_COSINE_TOKEN:-change-me-arcface-cosine}"
      FACE_WORKER_MODEL_CONFIG_ID: arcface_retinaface_cosine
      FACE_WORKER_CAPABILITY: face_compare.arcface_retinaface_cosine
      FACE_WORKER_POLL_SECONDS: "${FACE_WORKER_POLL_SECONDS:-2}"
    volumes:
      - ./.data:/app/.data
      - ./.models:/app/.models
      - ./datasets:/app/datasets

  worker-arcface-euclidean-l2:
    build: .
    command: python -m worker.main
    restart: unless-stopped
    depends_on:
      - api
    environment:
      FACE_API_BASE_URL: http://api:8000
