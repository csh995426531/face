    restart: unless-stopped
    depends_on:
      - api
    environment:
      FACE_API_BASE_URL: http://api:8000
      FACE_WORKER_ID: worker-facenet512
      FACE_WORKER_TOKEN: "${FACE_WORKER_FACENET512_TOKEN:-change-me-facenet512}"
      FACE_WORKER_MODEL_CONFIG_ID: facenet512_retinaface_cosine
      FACE_WORKER_CAPABILITY: face_compare.facenet512_retinaface_cosine
      FACE_WORKER_POLL_SECONDS: "${FACE_WORKER_POLL_SECONDS:-2}"
    volumes:
      - ./.data:/app/.data
      - ./.models:/app/.models
      - ./datasets:/app/datasets

  worker-ghostfacenet:
    build: .
    command: python -m worker.main
    restart: unless-stopped
    depends_on:
