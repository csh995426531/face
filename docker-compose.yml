      FACE_WORKER_MODEL_CONFIG_ID: arcface_retinaface_euclidean_l2
      FACE_WORKER_CAPABILITY: face_compare.arcface_retinaface_euclidean_l2
      FACE_WORKER_POLL_SECONDS: "${FACE_WORKER_POLL_SECONDS:-2}"
    volumes:
      - ./.data:/app/.data
      - ./.models:/app/.models
      - ./datasets:/app/datasets

  worker-facenet512:
